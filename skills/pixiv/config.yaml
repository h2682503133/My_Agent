# Pixiv 配置文件
pixiv:
  # OAuth 凭据（执行 `python pixiv.py login` 后自动写入）
  auth:
    access_token: "PHPSESSID=69448066_VkrjE6NhBKbP8RgczMsnUdqTaqaSDDbm;"
    refresh_token: ""
    expires_at: 0
    user: {}

  # 兼容旧字段，不再需要手动填 cookie
  cookie: ""

  proxy:  # 代理地址，不需要可留空
  download_dir: "../../workspace" # 下载保存目录
  r: false # 是否开启特殊模式
  auto_download: false # 搜索/爬榜时是否自动下载原图

monitor:
  interval: 3600 # 画师监控间隔，单位秒
  notify: true # 监控到新作品是否发送通知

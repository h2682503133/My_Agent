<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <!-- 移动端核心适配标签（唯一新增） -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>智能体对话</title>
        <style>
            *{margin:0;padding:0;box-sizing:border-box}
            /* 移动端全屏适配 */
            body{
                height:90vh;
                display:flex;
                flex-direction:column;
                background:#f5f5f5;
                font-family:微软雅黑;
                overflow:hidden;
            }
            /* 聊天区域：手机自适应滚动 */
            .chat{
                flex:1;
                overflow-y:auto;
                padding:20px;
                background:white;
                -webkit-overflow-scrolling:touch;
            }
            /* 消息样式（保留原有类名） */
            .msg{margin:10px 0;display:flex;max-width:85%}
            .user{margin-left:auto;justify-content:flex-end}
            .user .bubble{background:#0099ff;color:white;padding:12px 16px;border-radius:18px 18px 0 18px}
            .agent{margin-right:auto;justify-content:flex-start}
            .agent .bubble{background:#e5e5ea;color:#333;padding:12px 16px;border-radius:18px 18px 18px 0}
            /* 输入框：固定底部（移动端必备） */
            .input{
                display:flex;
                gap:10px;
                padding:10px;
                background:white;
                border-top:1px solid #eee;
            }
            input{
                flex:1;
                padding:14px 18px;
                border:1px solid #ddd;
                border-radius:25px;
                outline:none;
                font-size:16px;
            }
            button{
                padding:14px 26px;
                background:#0099ff;
                color:white;
                border:none;
                border-radius:25px;
                cursor:pointer;
                font-size:16px;
            }
            button:active{background:#0077cc}
        </style>
    </head>
    <body>
        <!-- 保留原有ID：chat -->
        <div class="chat" id="chat"></div>
        <div id="queue-status" style="margin-bottom:8px; font-size:14px; color:#666;">
            当前排队：0
        </div>
        <div class="input">
            <!-- 保留原有ID：text -->
            <input id="text" placeholder="输入消息...">
            <!-- 保留原有onclick：send() -->
            <button onclick="send()">发送</button>
        </div>
        <script>
            // 保留原有函数名：addMsg
            function addMsg(role, text){
                let chat = document.getElementById('chat');
                let cls = role === 'user' ? 'user msg' : 'agent msg';
                let html = `<div class="${cls}"><div class="bubble">${text}</div></div>`;
                chat.innerHTML += html;
                chat.scrollTop = chat.scrollHeight;
            }
            // 保留原有函数名：send
            async function send(){
                let text = document.getElementById('text').value;
                if(!text) return;
                addMsg('user', text);
                document.getElementById('text').value = '';
                // 保留原有接口：/chat
                let res = await fetch('/chat', {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({msg:text})
                });
                let data = await res.json();
                // 保留原有返回字段：data.reply
                addMsg('agent', data.reply);
            }
            const es = new EventSource('/queue/stream');
            es.onmessage = function(e) {
                const data = JSON.parse(e.data);
                document.getElementById('queue-status').textContent = 
                    `当前排队：${data.waiting}`;
            };
            </script>
            <button onclick="logout()">切换用户/退出登录</button>
            <script>
            function logout() {
                // 清除前端状态 + 跳回登录页
                window.location.href = "/logout";
            }
            </script>
    </body>
</html>
